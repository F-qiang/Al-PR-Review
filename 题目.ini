
题目一:语音版的日历工具
请开发一个语音日历工具，帮助用户提高日历管理的效率和便捷性。
要求：请了解用户在日历管理中的真实需求，设计并实现一个以语音交互为核心的日历管理工具，能准确、顺畅地实现通过语音添加/删除/查看事件提醒等能力。

题目二:多平台内容发布工具
很多创作者需要在公众号、知乎、B站、小红书等平台同步发布内容，但格式适配很麻烦。请设计并实现一个工具，帮助创作者提升发布效率和便捷性。
要求：用户在工具中输入内容，可自动适配各平台格式与风格，并支持一键发布（可选模拟发布）。需给出扩展更多平台的架构设计。

题目三:AI PR Review 助手
请开发一个AI代码评审工具，帮助开发者提升Pull Request的Review效率与质量。
要求：请了解开发者在代码评审中的真实需求，设计并实现一个以 AI 辅助分析为核心的工具。用户指定GitHub PR，系统自动获取代码变更并智能分析，辅助发现问题。需支持PR变更总结、风险代码识别、Review建议生成等。请综合考虑分析准确性、上下文理解、误报与漏报控制、响应速度及使用体验等关键因素，并在作品中说明系统在模型选择、上下文获取方式及未来扩展方向上的设计思路。